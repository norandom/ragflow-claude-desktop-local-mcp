name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Required when run manually."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Dagger CLI
        uses: dagger/dagger-for-github@e47aba410ef9bb9ed81a4d2a97df31061e5e842e # v8.0.0
        with:
          version: "0.20.8"
          verb: version

      - name: Test + build via Dagger
        run: |
          dagger call ci --source=. export --path=./dist

      - name: List artifacts
        run: ls -la dist/

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$TAG" = "$GITHUB_REF" ]; then
            TAG="$INPUT_TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        # GitHub Releases API. Skipped on Gitea.
        if: ${{ github.server_url == 'https://github.com' }}
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v2.1.0
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.whl
            dist/*.tar.gz

      - name: Create Gitea Release
        # Gitea-native release API. Runs only on a Gitea instance, where
        # github.server_url is the instance URL (not github.com).
        # GITEA_TOKEN is the auto-provisioned per-job token on Gitea Actions.
        # NOTE: @v1 is a moving tag — pin to a commit SHA for supply-chain safety.
        if: ${{ github.server_url != 'https://github.com' }}
        uses: akkuman/gitea-release-action@v1
        with:
          token: ${{ secrets.GITEA_TOKEN }}
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |-
            dist/*.whl
            dist/*.tar.gz
